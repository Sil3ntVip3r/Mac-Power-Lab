name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-v150-wait-snapshot:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/fix-benchmark-manifest-v1.5.0' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/fix-benchmark-manifest-v1.5.0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify focused starting state
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          expected=".github/workflows/ci.yml
CHANGELOG.md
README.md
docs/releases/RELEASE_NOTES_v1.5.0.md
internal/archive/archive.go
internal/archive/archive_test.go
internal/benchmark/benchmark.go
internal/benchmark/benchmark_test.go
internal/version/version.go
scripts/bootstrap_macos.sh
scripts/build_swiftui_app.sh"
          actual="$(git diff --name-only origin/main...HEAD)"
          test "$actual" = "$expected"
      - name: Snapshot child wait context
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          source = Path("internal/benchmark/benchmark.go")
          text = source.read_text()
          old = '''\ttype waitResult struct {
\t\tlabel string
\t\terr   error
\t}
\twaits := make(chan waitResult, len(processes))
\tfor _, process := range processes {
\t\tgo func(process *workloadProcess) {
\t\t\twaits <- waitResult{label: process.label, err: process.cmd.Wait()}
\t\t}(process)
\t}

\tvar result error
\trecordWait := func(waited waitResult) {
\t\tif waited.err != nil && runCtx.Err() == nil {
\t\t\tresult = errors.Join(result, fmt.Errorf("workload %s: %w", waited.label, waited.err))
\t\t\tcancel()
\t\t}
\t}
\tremaining := len(processes)
\tcontextDone := ctx.Done()
\tcontextEndedBeforeAllExited := ctx.Err() != nil
\tif contextEndedBeforeAllExited {
\t\tcontextDone = nil
\t}
\tfor remaining > 0 {
\t\tselect {
\t\tcase waited := <-waits:
\t\t\tremaining--
\t\t\trecordWait(waited)
\t\tcase <-contextDone:
\t\t\t// Prefer an exit result already buffered at the deadline. If none is
\t\t\t// available, the context ended while at least one child was active.
\t\t\tselect {
\t\t\tcase waited := <-waits:
\t\t\t\tremaining--
\t\t\t\trecordWait(waited)
\t\t\tdefault:
\t\t\t\tcontextEndedBeforeAllExited = true
\t\t\t\tcontextDone = nil
\t\t\t}
\t\t}
\t}
'''
          new = '''\ttype waitResult struct {
\t\tlabel      string
\t\terr        error
\t\tcontextErr error
\t}
\twaits := make(chan waitResult, len(processes))
\tfor _, process := range processes {
\t\tgo func(process *workloadProcess) {
\t\t\twaitErr := process.cmd.Wait()
\t\t\twaits <- waitResult{
\t\t\t\tlabel:      process.label,
\t\t\t\terr:        waitErr,
\t\t\t\tcontextErr: runCtx.Err(),
\t\t\t}
\t\t}(process)
\t}

\tvar result error
\tcontextEndedBeforeAllExited := false
\tfor range processes {
\t\twaited := <-waits
\t\twaitErr, contextEnded := classifyWorkloadWait(
\t\t\twaited.label,
\t\t\twaited.err,
\t\t\twaited.contextErr,
\t\t)
\t\tcontextEndedBeforeAllExited = contextEndedBeforeAllExited || contextEnded
\t\tif waitErr != nil {
\t\t\tresult = errors.Join(result, waitErr)
\t\t\tcancel()
\t\t}
\t}
'''
          if text.count(old) != 1:
              raise SystemExit("workload wait loop target was not unique")
          text = text.replace(old, new)

          marker = '''func capturePriorityObservation(
'''
          helper = '''func classifyWorkloadWait(label string, waitErr, contextErr error) (error, bool) {
\tif contextErr != nil {
\t\treturn nil, true
\t}
\tif waitErr == nil {
\t\treturn nil, false
\t}
\treturn fmt.Errorf("workload %s: %w", label, waitErr), false
}

'''
          if text.count(marker) != 1:
              raise SystemExit("workload wait helper insertion target was not unique")
          source.write_text(text.replace(marker, helper + marker))

          tests = Path("internal/benchmark/benchmark_test.go")
          text = tests.read_text()
          marker = '''func TestFinalizeWorkloadResultDistinguishesDeadlineOrder(t *testing.T) {
'''
          addition = '''func TestClassifyWorkloadWaitSnapshotsContextAtExit(t *testing.T) {
\texitErr := errors.New("exit status 7")
\tgot, contextEnded := classifyWorkloadWait("cpu_stress[1]", exitErr, nil)
\tif contextEnded || !errors.Is(got, exitErr) {
\t\tt.Fatalf("natural failure classification: err=%v contextEnded=%t", got, contextEnded)
\t}

\tgot, contextEnded = classifyWorkloadWait(
\t\t"cpu_stress[1]",
\t\terrors.New("signal: terminated"),
\t\tcontext.DeadlineExceeded,
\t)
\tif !contextEnded || got != nil {
\t\tt.Fatalf("deadline-driven exit classification: err=%v contextEnded=%t", got, contextEnded)
\t}

\tgot, contextEnded = classifyWorkloadWait("cpu_stress[1]", nil, nil)
\tif contextEnded || got != nil {
\t\tt.Fatalf("successful exit classification: err=%v contextEnded=%t", got, contextEnded)
\t}
}

'''
          if text.count(marker) != 1:
              raise SystemExit("workload wait classifier test insertion target was not unique")
          tests.write_text(text.replace(marker, addition + marker))
          PY
          gofmt -w internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go
          git diff --check
      - name: Required validation
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test -count=1 ./...
          go vet ./...
          GOMAXPROCS=2 go test -race -count=1 -p 1 ./...
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /tmp/macpowerlab-darwin-arm64 ./cmd/macpowerlab
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o /tmp/macpowerlab-darwin-amd64 ./cmd/macpowerlab
      - name: Commit validated wait snapshot
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git add internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go .github/workflows/ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: retain child exit ordering at timeout'
          git push origin HEAD:agent/fix-benchmark-manifest-v1.5.0

  go:
    if: github.event_name != 'pull_request' || github.head_ref != 'agent/fix-benchmark-manifest-v1.5.0' || github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal)"
      - name: Test
        run: go test -count=1 -timeout=90s ./...
      - name: Vet
        run: go vet ./...
      - name: Race detector
        run: go test -race -count=1 -timeout=180s ./internal/server ./internal/collector ./internal/benchmark ./internal/store ./internal/attribution ./internal/config ./internal/priority
      - name: Cross-build Darwin
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build ./cmd/macpowerlab
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build ./cmd/macpowerlab

  swift-syntax:
    if: github.event_name != 'pull_request' || github.head_ref != 'agent/fix-benchmark-manifest-v1.5.0' || github.actor == 'github-actions[bot]'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Parse Swift sources
        run: swiftc -frontend -parse swiftui/Sources/MacPowerLabApp/*.swift
      - name: Build native SwiftUI executable
        run: swift build --package-path swiftui
