name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-v150:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/fix-benchmark-manifest-v1.5.0' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/fix-benchmark-manifest-v1.5.0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify exact base and bootstrap-only diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          expected=5c71c24466866ceb089b1df6b42a21fff6561800
          test "$(git rev-parse origin/main)" = "$expected"
          test "$(git merge-base HEAD origin/main)" = "$expected"
          mapfile -t changed < <(git diff --name-only origin/main...HEAD)
          test "${#changed[@]}" = 2
          test "${changed[0]}" = .github/workflows/apply-v150-focused.yml
          test "${changed[1]}" = .github/workflows/ci.yml
      - name: Apply focused source changes
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '' | base64 --decode | gzip --decompress > /tmp/apply_v150_focused.py
          python3 /tmp/apply_v150_focused.py
          gofmt -w internal/archive/archive.go internal/archive/archive_test.go internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go internal/version/version.go
          rm -f /tmp/apply_v150_focused.py
          git diff --check
          git status --short
          git diff --stat origin/main
      - name: Required validation
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test -count=1 ./...
          go vet ./...
          GOMAXPROCS=2 go test -race -count=1 -p 1 ./...
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /tmp/macpowerlab-darwin-arm64 ./cmd/macpowerlab
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o /tmp/macpowerlab-darwin-amd64 ./cmd/macpowerlab
          go run ./cmd/macpowerlab version | grep -Eq '^MacPowerLab v1\.5\.0 \([^)]+/[^)]+\)$'
          grep -Fq '<key>CFBundleShortVersionString</key><string>1.5.0</string>' scripts/build_swiftui_app.sh
          grep -Fq '<key>CFBundleVersion</key><string>150</string>' scripts/build_swiftui_app.sh
      - name: Commit validated focused change
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/apply-v150-focused.yml
          git add CHANGELOG.md README.md docs/releases/RELEASE_NOTES_v1.5.0.md internal/archive/archive.go internal/archive/archive_test.go internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go internal/version/version.go scripts/bootstrap_macos.sh scripts/build_swiftui_app.sh .github/workflows/ci.yml .github/workflows/apply-v150-focused.yml
          test "$(git diff --cached --name-only | wc -l | tr -d ' ')" = 12
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: finalize benchmark completion and v1.5.0 metadata'
          git push origin HEAD:agent/fix-benchmark-manifest-v1.5.0

  go:
    if: github.event_name != 'pull_request' || github.head_ref != 'agent/fix-benchmark-manifest-v1.5.0' || github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal)"
      - name: Test
        run: go test -count=1 -timeout=90s ./...
      - name: Vet
        run: go vet ./...
      - name: Race detector
        run: go test -race -count=1 -timeout=180s ./internal/server ./internal/collector ./internal/benchmark ./internal/store ./internal/attribution ./internal/config ./internal/priority
      - name: Cross-build Darwin
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build ./cmd/macpowerlab
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build ./cmd/macpowerlab

  swift-syntax:
    if: github.event_name != 'pull_request' || github.head_ref != 'agent/fix-benchmark-manifest-v1.5.0' || github.actor == 'github-actions[bot]'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Parse Swift sources
        run: swiftc -frontend -parse swiftui/Sources/MacPowerLabApp/*.swift
      - name: Build native SwiftUI executable
        run: swift build --package-path swiftui
