name: Apply focused v1.5.0 patch

on:
  push:
    branches:
      - agent/fix-benchmark-manifest-v1.5.0

permissions:
  contents: write

concurrency:
  group: apply-v150-focused
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify exact base and bootstrap-only diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          expected=5c71c24466866ceb089b1df6b42a21fff6561800
          test "$(git rev-parse origin/main)" = "$expected"
          test "$(git merge-base HEAD origin/main)" = "$expected"
          changed="$(git diff --name-only origin/main...HEAD)"
          test "$changed" = ".github/workflows/apply-v150-focused.yml"

      - name: Apply focused source changes
