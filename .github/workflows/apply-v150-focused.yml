          gofmt -w internal/archive/archive.go internal/archive/archive_test.go internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go internal/version/version.go
          rm -f /tmp/apply_v150_focused.py /tmp/apply_v150_focused.py.gz.b64

      - name: Inspect exact diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git status --short
          git diff --stat origin/main
          git diff -- internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go internal/archive/archive.go internal/archive/archive_test.go internal/version/version.go scripts/bootstrap_macos.sh scripts/build_swiftui_app.sh CHANGELOG.md README.md docs/releases/RELEASE_NOTES_v1.5.0.md
          echo 'Remaining historical 1.4.0 references:'
          git grep -n '1\.4\.0' || true

      - name: Required validation
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test -count=1 ./...
          go vet ./...
          GOMAXPROCS=2 go test -race -count=1 -p 1 ./...
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /tmp/macpowerlab-darwin-arm64 ./cmd/macpowerlab
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o /tmp/macpowerlab-darwin-amd64 ./cmd/macpowerlab
          go run ./cmd/macpowerlab version | grep -Eq '^MacPowerLab v1\.5\.0 \([^)]+/[^)]+\)$'
          grep -Fq '<key>CFBundleShortVersionString</key><string>1.5.0</string>' scripts/build_swiftui_app.sh
          grep -Fq '<key>CFBundleVersion</key><string>150</string>' scripts/build_swiftui_app.sh

      - name: Commit validated focused change
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-v150-focused.yml
          git add CHANGELOG.md README.md docs/releases/RELEASE_NOTES_v1.5.0.md internal/archive/archive.go internal/archive/archive_test.go internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go internal/version/version.go scripts/bootstrap_macos.sh scripts/build_swiftui_app.sh .github/workflows/apply-v150-focused.yml
          test "$(git diff --cached --name-only | wc -l | tr -d ' ')" = 11
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: finalize benchmark completion and v1.5.0 metadata'
          git push origin HEAD:agent/fix-benchmark-manifest-v1.5.0
