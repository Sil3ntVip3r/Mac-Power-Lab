name: Refine v1.5.0 benchmark timeout

on:
  push:
    branches:
      - agent/fix-benchmark-manifest-v1.5.0

permissions:
  contents: write

concurrency:
  group: refine-v150-benchmark-timeout
  cancel-in-progress: false

jobs:
  refine-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify branch head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "e169c44a39a23d5b6fc12db8dec714c5ea760364"

      - name: Preserve cancellation and deadline ordering
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          source = Path("internal/benchmark/benchmark.go")
          text = source.read_text()

          old = '''\t\tcase err := <-done:
          \t\tdrainPriority()
          \t\treturn clonePriorityPointer(observed), err
          \tcase <-phaseCtx.Done():
          \t\t// Wait for workload cleanup. runCommands owns process Wait calls and
          \t\t// receives the same context, so this does not race with subprocess Wait.
          \t\t// Its result decides whether the deadline interrupted a child or only
          \t\t// raced with cleanup after every child had exited successfully.
          \t\tselect {
          \t\tcase err := <-done:
          \t\t\tdrainPriority()
          \t\t\treturn clonePriorityPointer(observed), err
          '''
          new = '''\t\tcase err := <-done:
          \t\tdrainPriority()
          \t\tif ctxErr := ctx.Err(); ctxErr != nil {
          \t\t\terr = errors.Join(ctxErr, err)
          \t\t}
          \t\treturn clonePriorityPointer(observed), err
          \tcase <-phaseCtx.Done():
          \t\t// Wait for workload cleanup. runCommands records whether the phase
          \t\t// context ended before all child Wait calls completed. This accepts
          \t\t// natural exits that beat the deadline while preserving deadline-driven
          \t\t// graceful exits and explicit parent cancellation.
          \t\tselect {
          \t\tcase err := <-done:
          \t\t\tdrainPriority()
          \t\t\tif ctxErr := ctx.Err(); ctxErr != nil {
          \t\t\t\terr = errors.Join(ctxErr, err)
          \t\t\t}
          \t\t\treturn clonePriorityPointer(observed), err
          '''
          if text.count(old) != 1:
              raise SystemExit("runPhase completion block did not match exactly once")
          text = text.replace(old, new)

          old = '''\tvar result error
          \tallExitedSuccessfully := true
          \tfor range processes {
          \t\twaited := <-waits
          \t\tif waited.err == nil {
          \t\t\tcontinue
          \t\t}
          \t\tallExitedSuccessfully = false
          \t\tif runCtx.Err() == nil {
          \t\t\tresult = errors.Join(result, fmt.Errorf("workload %s: %w", waited.label, waited.err))
          \t\t\tcancel()
          \t\t}
          \t}
          '''
          new = '''\tvar result error
          \trecordWait := func(waited waitResult) {
          \t\tif waited.err != nil && runCtx.Err() == nil {
          \t\t\tresult = errors.Join(result, fmt.Errorf("workload %s: %w", waited.label, waited.err))
          \t\t\tcancel()
          \t\t}
          \t}
          \tremaining := len(processes)
          \tcontextDone := ctx.Done()
          \tcontextEndedBeforeAllExited := ctx.Err() != nil
          \tif contextEndedBeforeAllExited {
          \t\tcontextDone = nil
          \t}
          \tfor remaining > 0 {
          \t\tselect {
          \t\tcase waited := <-waits:
          \t\t\tremaining--
          \t\t\trecordWait(waited)
          \t\tcase <-contextDone:
          \t\t\t// Prefer an exit result already buffered at the deadline. If none is
          \t\t\t// available, the context ended while at least one child was active.
          \t\t\tselect {
          \t\t\tcase waited := <-waits:
          \t\t\t\tremaining--
          \t\t\t\trecordWait(waited)
          \t\t\tdefault:
          \t\t\t\tcontextEndedBeforeAllExited = true
          \t\t\t\tcontextDone = nil
          \t\t\t}
          \t\t}
          \t}
          '''
          if text.count(old) != 1:
              raise SystemExit("runCommands wait block did not match exactly once")
          text = text.replace(old, new)

          old = '''\treturn finalizeWorkloadResult(ctx.Err(), allExitedSuccessfully, result)
          }
          
          func finalizeWorkloadResult(ctxErr error, allExitedSuccessfully bool, result error) error {
          \tif allExitedSuccessfully {
          \t\treturn result
          \t}
          \treturn errors.Join(ctxErr, result)
          }
          '''
          new = '''\treturn finalizeWorkloadResult(ctx.Err(), contextEndedBeforeAllExited, result)
          }
          
          func finalizeWorkloadResult(ctxErr error, contextEndedBeforeAllExited bool, result error) error {
          \tif contextEndedBeforeAllExited {
          \t\treturn errors.Join(ctxErr, result)
          \t}
          \treturn result
          }
          '''
          if text.count(old) != 1:
              raise SystemExit("finalizeWorkloadResult block did not match exactly once")
          source.write_text(text.replace(old, new))

          tests = Path("internal/benchmark/benchmark_test.go")
          text = tests.read_text()
          old = '''func TestFinalizeWorkloadResultPrefersSuccessfulExit(t *testing.T) {
          \tif err := finalizeWorkloadResult(context.DeadlineExceeded, true, nil); err != nil {
          \t\tt.Fatalf("successful exit inherited deadline: %v", err)
          \t}
          
          \tsyncErr := errors.New("sync failed")
          \tif err := finalizeWorkloadResult(context.DeadlineExceeded, true, syncErr); !errors.Is(err, syncErr) || errors.Is(err, context.DeadlineExceeded) {
          \t\tt.Fatalf("successful process with output failure returned %v", err)
          \t}
          
          \texitErr := errors.New("exit status 1")
          \tif err := finalizeWorkloadResult(context.DeadlineExceeded, false, exitErr); !errors.Is(err, context.DeadlineExceeded) || !errors.Is(err, exitErr) {
          \t\tt.Fatalf("failed process lost deadline or exit error: %v", err)
          \t}
          }
          '''
          new = '''func TestRunPhasePreservesParentCancellationAfterSuccessfulCleanup(t *testing.T) {
          \tmonitor := &fakeMonitor{
          \t\tsample:  &model.PowerSample{Battery: model.BatterySample{PowerSource: "Battery Power"}},
          \t\tsession: model.Session{ID: "session"},
          \t\tdir:     t.TempDir(),
          \t}
          \tstarted := make(chan struct{})
          \tdeps := testControllerDependencies(func(ctx context.Context, _ string, _ Phase, _ Options) error {
          \t\tclose(started)
          \t\t<-ctx.Done()
          \t\treturn nil
          \t})
          \tcontroller := newController(monitor, deps)
          \tphase := Phase{Name: "phase", Kind: "cpu", Duration: time.Minute}
          \tctx, cancel := context.WithCancel(context.Background())
          \tdone := make(chan error, 1)
          \tgo func() {
          \t\t_, err := controller.runPhase(
          \t\t\tctx,
          \t\t\tPlan{Name: "test", Phases: []Phase{phase}},
          \t\t\t0,
          \t\t\tphase,
          \t\t\tOptions{},
          \t\t)
          \t\tdone <- err
          \t}()
          \t<-started
          \tcancel()
          \tif err := <-done; !errors.Is(err, context.Canceled) {
          \t\tt.Fatalf("parent cancellation was lost: %v", err)
          \t}
          }
          
          func TestFinalizeWorkloadResultDistinguishesDeadlineOrder(t *testing.T) {
          \tif err := finalizeWorkloadResult(context.DeadlineExceeded, false, nil); err != nil {
          \t\tt.Fatalf("successful exit before deadline inherited cleanup deadline: %v", err)
          \t}
          
          \tsyncErr := errors.New("sync failed")
          \tif err := finalizeWorkloadResult(context.DeadlineExceeded, false, syncErr); !errors.Is(err, syncErr) || errors.Is(err, context.DeadlineExceeded) {
          \t\tt.Fatalf("post-exit output failure returned %v", err)
          \t}
          
          \tif err := finalizeWorkloadResult(context.DeadlineExceeded, true, nil); !errors.Is(err, context.DeadlineExceeded) {
          \t\tt.Fatalf("deadline-driven graceful exit was accepted: %v", err)
          \t}
          
          \texitErr := errors.New("exit status 1")
          \tif err := finalizeWorkloadResult(nil, false, exitErr); !errors.Is(err, exitErr) {
          \t\tt.Fatalf("child failure was lost: %v", err)
          \t}
          \tif err := finalizeWorkloadResult(context.DeadlineExceeded, true, exitErr); !errors.Is(err, context.DeadlineExceeded) || !errors.Is(err, exitErr) {
          \t\tt.Fatalf("deadline or child failure was lost: %v", err)
          \t}
          }
          '''
          if text.count(old) != 1:
              raise SystemExit("benchmark finalizer tests did not match exactly once")
          tests.write_text(text.replace(old, new))
          PY
          gofmt -w internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go

      - name: Inspect exact diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git status --short
          git diff -- internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go

      - name: Required validation
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test -count=1 ./...
          go vet ./...
          GOMAXPROCS=2 go test -race -count=1 -p 1 ./...
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /tmp/macpowerlab-darwin-arm64 ./cmd/macpowerlab
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o /tmp/macpowerlab-darwin-amd64 ./cmd/macpowerlab

      - name: Commit validated refinement
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/refine-v150-benchmark-timeout.yml
          git add internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go .github/workflows/refine-v150-benchmark-timeout.yml
          test "$(git diff --cached --name-only | wc -l | tr -d ' ')" = 3
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: preserve benchmark timeout ordering'
          git push origin HEAD:agent/fix-benchmark-manifest-v1.5.0
