name: Bootstrap source tree

on:
  push:
    branches:
      - bootstrap/v1.4.0-retry
    paths:
      - bootstrap/READY

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/source.part-* | base64 --decode > /tmp/mac-power-lab-source.tar.gz
          echo "7a8112d806e987239e4ca06140759731744e00173faa29974c0d2c1db56c7fc5  /tmp/mac-power-lab-source.tar.gz" | sha256sum --check --strict
      - name: Replace bootstrap files with the source tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/mac-power-lab-source.tar.gz -C .
          rm -rf .github/workflows
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: publish Mac Power Lab v1.4.0" -m "Add the Go engine, SwiftUI client, native workloads, legacy compatibility layer, documentation, project governance, and release-ready repository structure."
          git push origin HEAD
