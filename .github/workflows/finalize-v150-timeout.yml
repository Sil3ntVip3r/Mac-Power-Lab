name: Finalize v1.5.0 timeout ordering

on:
  push:
    branches:
      - agent/fix-benchmark-manifest-v1.5.0

permissions:
  contents: write

concurrency:
  group: finalize-v150-timeout
  cancel-in-progress: false

jobs:
  finalize-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Record whether context ended before each child exit
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          source = Path("internal/benchmark/benchmark.go")
          text = source.read_text()
          old = '''\ttype waitResult struct {
          \t\tlabel string
          \t\terr   error
          \t}
          \twaits := make(chan waitResult, len(processes))
          \tfor _, process := range processes {
          \t\tgo func(process *workloadProcess) {
          \t\t\twaits <- waitResult{label: process.label, err: process.cmd.Wait()}
          \t\t}(process)
          \t}
          
          \tvar result error
          \trecordWait := func(waited waitResult) {
          \t\tif waited.err != nil && runCtx.Err() == nil {
          \t\t\tresult = errors.Join(result, fmt.Errorf("workload %s: %w", waited.label, waited.err))
          \t\t\tcancel()
          \t\t}
          \t}
          \tremaining := len(processes)
          \tcontextDone := ctx.Done()
          \tcontextEndedBeforeAllExited := ctx.Err() != nil
          \tif contextEndedBeforeAllExited {
          \t\tcontextDone = nil
          \t}
          \tfor remaining > 0 {
          \t\tselect {
          \t\tcase waited := <-waits:
          \t\t\tremaining--
          \t\t\trecordWait(waited)
          \t\tcase <-contextDone:
          \t\t\t// Prefer an exit result already buffered at the deadline. If none is
          \t\t\t// available, the context ended while at least one child was active.
          \t\t\tselect {
          \t\t\tcase waited := <-waits:
          \t\t\t\tremaining--
          \t\t\t\trecordWait(waited)
          \t\t\tdefault:
          \t\t\t\tcontextEndedBeforeAllExited = true
          \t\t\t\tcontextDone = nil
          \t\t\t}
          \t\t}
          \t}
          '''
          new = '''\ttype waitResult struct {
          \t\tlabel        string
          \t\terr          error
          \t\tcontextEnded bool
          \t}
          \twaits := make(chan waitResult, len(processes))
          \tfor _, process := range processes {
          \t\tgo func(process *workloadProcess) {
          \t\t\twaitErr := process.cmd.Wait()
          \t\t\twaits <- waitResult{
          \t\t\t\tlabel:        process.label,
          \t\t\t\terr:          waitErr,
          \t\t\t\tcontextEnded: ctx.Err() != nil,
          \t\t\t}
          \t\t}(process)
          \t}
          
          \tvar result error
          \tcontextEndedBeforeAllExited := false
          \tfor range processes {
          \t\twaited := <-waits
          \t\tcontextEndedBeforeAllExited = contextEndedBeforeAllExited || waited.contextEnded
          \t\tif waited.err != nil && runCtx.Err() == nil {
          \t\t\tresult = errors.Join(result, fmt.Errorf("workload %s: %w", waited.label, waited.err))
          \t\t\tcancel()
          \t\t}
          \t}
          '''
          if text.count(old) != 1:
              raise SystemExit("benchmark wait ordering block did not match exactly once")
          source.write_text(text.replace(old, new))

          tests = Path("internal/benchmark/benchmark_test.go")
          text = tests.read_text()
          old = '''import (
          \t"context"
          \t"errors"
          \t"strings"
          \t"sync"
          \t"testing"
          \t"time"
          '''
          new = '''import (
          \t"context"
          \t"errors"
          \t"os"
          \t"os/signal"
          \t"strings"
          \t"sync"
          \t"testing"
          \t"time"
          '''
          if text.count(old) != 1:
              raise SystemExit("benchmark test imports did not match exactly once")
          text = text.replace(old, new)

          marker = '''func TestFinalizeWorkloadResultDistinguishesDeadlineOrder(t *testing.T) {
          '''
          addition = '''func TestRunCommandsPreservesDeadlineForGracefulExit(t *testing.T) {
          \tconst helperEnvironment = "MACPOWERLAB_GRACEFUL_WORKLOAD_HELPER"
          \tif os.Getenv(helperEnvironment) == "1" {
          \t\tsignals := make(chan os.Signal, 1)
          \t\tsignal.Notify(signals)
          \t\t<-signals
          \t\tos.Exit(0)
          \t}
          
          \tt.Setenv(helperEnvironment, "1")
          \tctx, cancel := context.WithTimeout(context.Background(), 500*time.Millisecond)
          \tdefer cancel()
          \terr := runCommands(
          \t\tctx,
          \t\tt.TempDir(),
          \t\t"run",
          \t\t"phase",
          \t\t[][]string{{os.Args[0], "-test.run=^TestRunCommandsPreservesDeadlineForGracefulExit$"}},
          \t\t0,
          \t\tnil,
          \t)
          \tif !errors.Is(err, context.DeadlineExceeded) {
          \t\tt.Fatalf("deadline-driven graceful exit was accepted: %v", err)
          \t}
          }
          
          '''
          if text.count(marker) != 1:
              raise SystemExit("benchmark finalizer test marker did not match exactly once")
          tests.write_text(text.replace(marker, addition + marker))
          PY
          gofmt -w internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go
          git diff --check

      - name: Required validation
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test -count=1 ./...
          go vet ./...
          GOMAXPROCS=2 go test -race -count=1 -p 1 ./...
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /tmp/macpowerlab-darwin-arm64 ./cmd/macpowerlab
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o /tmp/macpowerlab-darwin-amd64 ./cmd/macpowerlab

      - name: Commit validated finalization
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-v150-timeout.yml
          git add internal/benchmark/benchmark.go internal/benchmark/benchmark_test.go .github/workflows/finalize-v150-timeout.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: retain deadline on graceful timeout exit'
          git push origin HEAD:agent/fix-benchmark-manifest-v1.5.0
