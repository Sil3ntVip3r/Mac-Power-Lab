name: Bug report
description: Report a reproducible Mac Power Lab defect
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include tokens, passwords, private paths, or unredacted personal logs.
  - type: input
    id: version
    attributes:
      label: Mac Power Lab version
      placeholder: v1.4.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and build
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Commands and relevant sanitized output
